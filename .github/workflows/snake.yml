# ════════════════════════════════════════════════════════════════
#  Génère l'animation "serpent" qui mange tes contributions GitHub.
#  Le SVG est publié sur la branche `output` puis affiché dans le
#  README via une URL raw.githubusercontent.com.
#
#  Rien à configurer : GITHUB_TOKEN est fourni automatiquement.
#  Se relance tout seul toutes les 12h (+ à chaque push sur main,
#  + manuellement via l'onglet "Actions" → Run workflow).
# ════════════════════════════════════════════════════════════════
name: Generate Snake Animation

on:
  schedule:
    # toutes les 12 heures
    - cron: "0 */12 * * *"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake images
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
            dist/github-contribution-grid-snake.gif?color_snake=orange&color_dots=#bfd0e0,#38bdf8,#2a7fae,#1e3a5f,#0d1b3e

      - name: Push snake to the output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
